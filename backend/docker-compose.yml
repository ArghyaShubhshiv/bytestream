services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: bytestream
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  piston:
    image: ghcr.io/engineer-man/piston:latest
    ports:
      - "2000:2000"
    restart: unless-stopped
    privileged: true
    volumes:
      - ./data/piston/packages:/piston/packages
    tmpfs:
      - /tmp:exec
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://localhost:2000/api/v2/runtimes', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  piston-init:
    image: curlimages/curl
    depends_on:
      piston:
        condition: service_healthy
    restart: on-failure
    command: >
      sh -c '
        set -e;
        install_pkg() {
          lang="$$1";
          version="$$2";
          attempts=1;
          max_attempts=8;
          until [ "$$attempts" -gt "$$max_attempts" ]; do
            echo "[piston-init] Installing $${lang}-$${version} (attempt $$attempts/$$max_attempts)";
            if curl -fsS --max-time 600 -X POST http://piston:2000/api/v2/packages -H "Content-Type: application/json" -d "{\"language\":\"$${lang}\",\"version\":\"$${version}\"}"; then
              echo "[piston-init] Installed $${lang}-$${version}";
              return 0;
            fi
            attempts=$$((attempts + 1));
            echo "[piston-init] Retry $${lang}-$${version} in 15s";
            sleep 15;
          done
          echo "[piston-init] Failed to install $${lang}-$${version} after $$max_attempts attempts";
          return 1;
        }

        install_pkg python 3.10.0;
        install_pkg java 15.0.2;
        install_pkg gcc 10.2.0;
      '

volumes:
  postgres_data: